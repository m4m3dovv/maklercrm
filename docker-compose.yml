version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nexora_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yourpassword}
      POSTGRES_DB: ${POSTGRES_DB:-nexora_crm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    container_name: nexora_bot
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      # Docker içərisində localhost əvəzinə "db" servis adı istifadə olunmalıdır
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-yourpassword}@db:5432/${POSTGRES_DB:-nexora_crm}

volumes:
  postgres_data:
